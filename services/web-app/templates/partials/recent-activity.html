<div class="flow-root">
    <ul role="list" class="-mb-8">
        {{range $index, $activity := .Activities}}
        <li>
            <div class="relative pb-8">
                {{if ne $index (len $.Activities | add -1)}}
                <span class="absolute top-4 left-4 -ml-px h-full w-0.5 bg-slate-600" aria-hidden="true"></span>
                {{end}}
                <div class="relative flex space-x-3">
                    <div>
                        <span class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center ring-4 ring-slate-800">
                            <svg class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </span>
                    </div>
                    <div class="min-w-0 flex-1 pt-1.5 flex justify-between space-x-4">
                        <div>
                            <p class="text-sm text-slate-300">{{$activity.Action}}</p>
                        </div>
                        <div class="text-right text-sm whitespace-nowrap text-slate-500">
                            <time>{{$activity.Timestamp}}</time>
                        </div>
                    </div>
                </div>
            </div>
        </li>
        {{end}}
    </ul>
</div>

<div class="mt-6">
    <button
        class="w-full inline-flex justify-center items-center px-4 py-2 border border-slate-600 text-sm font-medium rounded-lg text-slate-300 bg-slate-700 hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-slate-800 transition-colors"
        hx-get="/dashboard/activity"
        hx-swap="outerHTML"
    >
        Refresh Activity
    </button>
</div>
