<div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
    <div class="flex items-center">
        <div class="p-3 rounded-lg bg-indigo-500/10">
            <svg class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-slate-400">Account Created</p>
            <p class="text-lg font-semibold text-white">{{formatTime .CreatedAt}}</p>
        </div>
    </div>
</div>

<div class="bg-slate-800 rounded-xl p-6 border border-slate-700">

            <p class="text-lg font-semibold text-white">{{.User.Email}}</p>

</div>

<div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
