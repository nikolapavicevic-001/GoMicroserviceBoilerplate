<div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-slate-700">
        <thead>
            <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
                    Name
                </th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
                    Email
                </th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">
                    Created
                </th>
                <th scope="col" class="relative px-6 py-3">
                    <span class="sr-only">Actions</span>
                </th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-700">
            {{range .Users}}
            <tr class="hover:bg-slate-700/50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 h-10 w-10">
                            <div class="h-10 w-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-medium">
                                {{index .Name 0}}
                            </div>
                        </div>
                        <div class="ml-4">
                            <div class="text-sm font-medium text-white">{{.Name}}</div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm text-slate-300">{{.Email}}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">
                    {{formatTime .CreatedAt}}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors">View</a>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

<div class="px-6 py-4 flex items-center justify-between border-t border-slate-700">
    <div class="flex-1 flex justify-between sm:hidden">
        <button class="relative inline-flex items-center px-4 py-2 border border-slate-600 text-sm font-medium rounded-lg text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors">
            Previous
        </button>
        <button class="ml-3 relative inline-flex items-center px-4 py-2 border border-slate-600 text-sm font-medium rounded-lg text-slate-300 bg-slate-700 hover:bg-slate-600 transition-colors">
            Next
        </button>
    </div>
    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
        <div>
            <p class="text-sm text-slate-400">
                Showing <span class="font-medium text-slate-200">{{len .Users}}</span> of <span class="font-medium text-slate-200">{{.Total}}</span> users
            </p>
        </div>
        <div>
            <nav class="relative z-0 inline-flex rounded-lg shadow-sm -space-x-px" aria-label="Pagination">
                <button class="relative inline-flex items-center px-2 py-2 rounded-l-lg border border-slate-600 bg-slate-700 text-sm font-medium text-slate-400 hover:bg-slate-600 transition-colors">
                    <span class="sr-only">Previous</span>
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </button>
                <button class="relative inline-flex items-center px-4 py-2 border border-slate-600 bg-slate-700 text-sm font-medium text-slate-300 hover:bg-slate-600 transition-colors">
                    1
                </button>
                <button class="relative inline-flex items-center px-2 py-2 rounded-r-lg border border-slate-600 bg-slate-700 text-sm font-medium text-slate-400 hover:bg-slate-600 transition-colors">
                    <span class="sr-only">Next</span>
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </button>
            </nav>
        </div>
    </div>
</div>
