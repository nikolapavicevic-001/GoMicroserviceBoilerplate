apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: boilerplate
type: Opaque
stringData:
  # JWT Secret (base64 encoded in production)
  JWT_SECRET: "your-secret-key-change-in-production-minimum-32-characters"

  # Session Secret
  SESSION_SECRET: "change-this-secret-in-production-minimum-32-chars"

  # CSRF Secret
  CSRF_SECRET: "change-this-csrf-secret-in-production"

  # OAuth2 - Google (set these in production)
  OAUTH2_GOOGLE_CLIENT_ID: ""
  OAUTH2_GOOGLE_CLIENT_SECRET: ""

  # OAuth2 - GitHub (set these in production)
  OAUTH2_GITHUB_CLIENT_ID: ""
  OAUTH2_GITHUB_CLIENT_SECRET: ""
---
# Note: In production, create secrets using:
# kubectl create secret generic app-secrets \
#   --from-literal=JWT_SECRET=your-actual-secret \
#   --from-literal=SESSION_SECRET=your-session-secret \
#   --from-literal=OAUTH2_GOOGLE_CLIENT_ID=your-client-id \
#   --from-literal=OAUTH2_GOOGLE_CLIENT_SECRET=your-client-secret \
#   -n boilerplate
