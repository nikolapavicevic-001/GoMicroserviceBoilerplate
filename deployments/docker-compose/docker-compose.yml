services:
  # MongoDB (latest)
  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=users_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boilerplate

  # User Service
  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "50051:50051"
    environment:
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - ENVIRONMENT=development
      # Service config
      - USER_SERVICE_GRPC_PORT=50051
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=users_db
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - boilerplate

  # API Gateway
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - ENVIRONMENT=development
      # Service config
      - GATEWAY_HTTP_PORT=8080
      - GATEWAY_USER_SERVICE_ADDR=user-service:50051
      - GATEWAY_WEBAPP_ADDR=http://web-app:3000
      # JWT (shared secret)
      - JWT_SECRET=your-secret-key-change-in-production-minimum-32-characters
      - JWT_EXPIRY=24h
      - JWT_REFRESH_EXPIRY=168h
      # OAuth2 (optional)
      - OAUTH2_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID:-}
      - OAUTH2_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET:-}
      - OAUTH2_GOOGLE_REDIRECT_URL=http://localhost:8080/api/v1/auth/google/callback
      # CORS
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      - user-service
    networks:
      - boilerplate

  # Web App
  web-app:
    build:
      context: ../..
      dockerfile: services/web-app/Dockerfile
    container_name: web-app
    ports:
      - "3000:3000"
    environment:
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - ENVIRONMENT=development
      # Service config
      - WEBAPP_HTTP_PORT=3000
      - WEBAPP_USER_SERVICE_ADDR=user-service:50051
      - WEBAPP_GATEWAY_ADDR=http://api-gateway:8080
      # JWT (shared secret - must match API Gateway)
      - JWT_SECRET=your-secret-key-change-in-production-minimum-32-characters
      - JWT_EXPIRY=24h
    depends_on:
      - user-service
      - api-gateway
    networks:
      - boilerplate

networks:
  boilerplate:
    driver: bridge

volumes:
  mongodb_data:
