services:
  # MongoDB (latest)
  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=users_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boilerplate

  # Kafka with KRaft (no Zookeeper)
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Cluster settings
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      # Allow plaintext
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: kafka-topics.sh --bootstrap-server kafka:29092 --list
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - boilerplate

  # Jaeger
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: jaeger
    ports:
      - "16686:16686"  # Web UI
      - "14268:14268"  # Direct
    networks:
      - boilerplate

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - boilerplate

  # User Service
  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "50051:50051"
    environment:
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - USER_SERVICE_GRPC_PORT=50051
      - USER_SERVICE_MONGO_URI=mongodb://mongodb:27017
      - USER_SERVICE_MONGO_DB=users_db
      - KAFKA_BROKERS=kafka:29092
      - OTLP_ENDPOINT=otel-collector:4318
      - TRACING_ENABLED=true
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - boilerplate

  # API Gateway
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - GATEWAY_HTTP_PORT=8080
      - GATEWAY_USER_SERVICE_ADDR=user-service:50051
      - JWT_SECRET=your-secret-key-change-in-production-minimum-32-characters
      - JWT_EXPIRY=24h
      - JWT_REFRESH_EXPIRY=168h
      - OAUTH2_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID}
      - OAUTH2_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET}
      - OAUTH2_GOOGLE_REDIRECT_URL=http://localhost:8080/auth/google/callback
      - OAUTH2_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID}
      - OAUTH2_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET}
      - OAUTH2_GITHUB_REDIRECT_URL=http://localhost:8080/auth/github/callback
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - OTLP_ENDPOINT=otel-collector:4318
      - TRACING_ENABLED=true
    depends_on:
      - user-service
    networks:
      - boilerplate

  # Web App
  web-app:
    build:
      context: ../..
      dockerfile: services/web-app/Dockerfile
    container_name: web-app
    ports:
      - "3000:3000"
    environment:
      - LOG_LEVEL=debug
      - LOG_FORMAT=console
      - WEBAPP_HTTP_PORT=3000
      - WEBAPP_USER_SERVICE_ADDR=user-service:50051
      - WEBAPP_GATEWAY_ADDR=http://api-gateway:8080
      - SESSION_SECRET=change-this-secret-in-production-minimum-32-chars
      - SESSION_MAX_AGE=24h
      - JWT_SECRET=your-secret-key-change-in-production-minimum-32-characters
      - JWT_EXPIRY=24h
      - OAUTH2_GOOGLE_CLIENT_ID=${OAUTH2_GOOGLE_CLIENT_ID}
      - OAUTH2_GOOGLE_CLIENT_SECRET=${OAUTH2_GOOGLE_CLIENT_SECRET}
      - OAUTH2_GOOGLE_REDIRECT_URL=http://localhost:3000/auth/google/callback
      - OAUTH2_GITHUB_CLIENT_ID=${OAUTH2_GITHUB_CLIENT_ID}
      - OAUTH2_GITHUB_CLIENT_SECRET=${OAUTH2_GITHUB_CLIENT_SECRET}
      - OAUTH2_GITHUB_REDIRECT_URL=http://localhost:3000/auth/github/callback
      - CSRF_SECRET=change-this-csrf-secret-in-production
      - OTLP_ENDPOINT=otel-collector:4318
      - TRACING_ENABLED=true
    depends_on:
      - user-service
      - api-gateway
    networks:
      - boilerplate

networks:
  boilerplate:
    driver: bridge

volumes:
  mongodb_data:
  kafka_data:
  prometheus_data:
