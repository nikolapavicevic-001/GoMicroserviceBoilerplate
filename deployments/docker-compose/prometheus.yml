global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Jaeger metrics
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          service: 'jaeger'

  # OpenTelemetry Collector span metrics (for Jaeger Monitor tab)
  - job_name: 'otel-collector-spanmetrics'
    static_configs:
      - targets: ['otel-collector:8889']

  # For local development (make dev) - services on host
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'api-gateway'
          environment: 'development'

  - job_name: 'web-app'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'web-app'
          environment: 'development'
