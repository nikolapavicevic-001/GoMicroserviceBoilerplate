global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9090']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:9091']

  - job_name: 'web-app'
    static_configs:
      - targets: ['web-app:9092']
